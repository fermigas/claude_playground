<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neural Garden</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0c08; }
  canvas { display: block; }
  #label {
    position: fixed; bottom: 16px; right: 20px;
    font-family: 'Courier New', monospace; font-size: 11px;
    color: rgba(120, 160, 100, 0.35); letter-spacing: 1.5px;
    pointer-events: none; user-select: none;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="label">claude_playground &mdash; growing connections</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// --- Network state ---
const nodes = [];
const edges = [];
const signals = []; // { edge, progress, speed, color }
const spores = [];

const maxNodes = 1200;
const growthQueue = []; // { parentIndex, angle, delay }

// --- Color palettes ---
// Earth tones, mossy greens, occasional electric blue
function earthColor(variation) {
  const palettes = [
    [60, 90, 40],    // deep moss
    [80, 120, 50],   // moss green
    [100, 140, 60],  // bright moss
    [70, 100, 70],   // sage
    [90, 80, 50],    // earth brown-green
    [50, 70, 45],    // dark forest
    [110, 130, 70],  // lichen
    [80, 100, 55],   // fern
  ];
  const p = palettes[Math.floor(Math.random() * palettes.length)];
  const v = variation || 0;
  return {
    r: Math.min(255, p[0] + (Math.random() - 0.5) * 30 + v),
    g: Math.min(255, p[1] + (Math.random() - 0.5) * 30 + v),
    b: Math.min(255, p[2] + (Math.random() - 0.5) * 20 + v),
  };
}

function synapticBlue() {
  return {
    r: 60 + Math.random() * 40,
    g: 160 + Math.random() * 60,
    b: 220 + Math.random() * 35,
  };
}

// --- Node ---
class Node {
  constructor(x, y, depth, parentIndex) {
    this.x = x;
    this.y = y;
    this.depth = depth;
    this.parentIndex = parentIndex;
    this.color = earthColor();
    this.baseSize = Math.max(1.5, 4 - depth * 0.15);
    this.pulsePhase = Math.random() * Math.PI * 2;
    this.pulseSpeed = Math.random() * 0.003 + 0.002;
    this.children = [];
    this.signalBrightness = 0; // for cascade effect
    this.age = 0;
    this.maxAge = 30 + Math.random() * 30; // fade-in frames
  }
}

// --- Spore particle ---
class Spore {
  constructor() { this.reset(true); }
  reset(init) {
    this.x = Math.random() * W;
    this.y = init ? Math.random() * H : -5;
    this.size = Math.random() * 1.5 + 0.3;
    this.speedY = Math.random() * 0.12 + 0.03;
    this.speedX = (Math.random() - 0.5) * 0.2;
    this.alpha = Math.random() * 0.25 + 0.05;
    this.phase = Math.random() * Math.PI * 2;
    this.wobbleAmp = Math.random() * 0.4 + 0.1;
  }
  update(time) {
    this.y += this.speedY;
    this.x += this.speedX + Math.sin(time * 0.0004 + this.phase) * this.wobbleAmp;
    if (this.y > H + 10 || this.x < -10 || this.x > W + 10) this.reset(false);
  }
  draw(time) {
    const twinkle = 0.5 + 0.5 * Math.sin(time * 0.005 + this.phase);
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(140, 180, 120, ${this.alpha * twinkle})`;
    ctx.fill();
  }
}

// --- Growth logic ---
function addNode(x, y, depth, parentIndex) {
  if (nodes.length >= maxNodes) return -1;
  const n = new Node(x, y, depth, parentIndex);
  const idx = nodes.length;
  nodes.push(n);
  if (parentIndex >= 0) {
    edges.push({ from: parentIndex, to: idx });
    nodes[parentIndex].children.push(idx);
  }
  return idx;
}

function scheduleGrowth(parentIndex, count) {
  const parent = nodes[parentIndex];
  if (!parent || parent.depth > 25) return;

  // Determine base angle from parent's parent for continuation
  let baseAngle;
  if (parent.parentIndex >= 0) {
    const pp = nodes[parent.parentIndex];
    baseAngle = Math.atan2(parent.y - pp.y, parent.x - pp.x);
  } else {
    baseAngle = Math.random() * Math.PI * 2;
  }

  const numBranches = count || (Math.random() < 0.3 ? 2 : 1);
  for (let i = 0; i < numBranches; i++) {
    const angleSpread = (Math.random() - 0.5) * (parent.depth < 3 ? 1.8 : 1.0);
    const angle = baseAngle + angleSpread;
    const delay = Math.floor(Math.random() * 60 + 10);
    growthQueue.push({ parentIndex, angle, delay });
  }
}

function processGrowthQueue() {
  for (let i = growthQueue.length - 1; i >= 0; i--) {
    growthQueue[i].delay--;
    if (growthQueue[i].delay <= 0) {
      const g = growthQueue.splice(i, 1)[0];
      const parent = nodes[g.parentIndex];
      if (!parent || nodes.length >= maxNodes) continue;

      const len = Math.max(8, 30 - parent.depth * 0.8) + Math.random() * 15;
      const nx = parent.x + Math.cos(g.angle) * len;
      const ny = parent.y + Math.sin(g.angle) * len;

      // Don't grow too far off screen
      if (nx < -100 || nx > W + 100 || ny < -100 || ny > H + 100) continue;

      // Avoid overlapping existing nodes
      let tooClose = false;
      for (const n of nodes) {
        const dx = n.x - nx, dy = n.y - ny;
        if (dx * dx + dy * dy < 100) { tooClose = true; break; }
      }
      if (tooClose) continue;

      const idx = addNode(nx, ny, parent.depth + 1, g.parentIndex);
      if (idx >= 0 && Math.random() < Math.max(0.1, 0.7 - parent.depth * 0.04)) {
        scheduleGrowth(idx);
      }
    }
  }
}

// --- Signal cascade ---
function triggerCascade(nodeIndex) {
  const visited = new Set();
  const queue = [{ idx: nodeIndex, delay: 0 }];
  visited.add(nodeIndex);

  while (queue.length > 0) {
    const { idx, delay } = queue.shift();
    const node = nodes[idx];
    if (!node) continue;

    // Schedule signal brightness
    setTimeout(() => {
      node.signalBrightness = 1.0;
    }, delay * 16);

    // Find connected edges
    for (const e of edges) {
      let neighbor = -1;
      if (e.from === idx && !visited.has(e.to)) neighbor = e.to;
      if (e.to === idx && !visited.has(e.from)) neighbor = e.from;
      if (neighbor >= 0) {
        visited.add(neighbor);
        // Create traveling signal on edge
        const isForward = e.from === idx;
        setTimeout(() => {
          signals.push({
            edge: e,
            progress: isForward ? 0 : 1,
            speed: isForward ? 0.03 : -0.03,
            life: 1,
          });
        }, delay * 16);
        queue.push({ idx: neighbor, delay: delay + 3 + Math.floor(Math.random() * 2) });
      }
    }
  }
}

// --- Interaction ---
let lastClickTime = 0;
canvas.addEventListener('click', e => {
  const now = Date.now();
  const isDouble = (now - lastClickTime) < 350;
  lastClickTime = now;

  if (isDouble) {
    // Double click — find nearest node and cascade
    let nearest = -1, minDist = Infinity;
    for (let i = 0; i < nodes.length; i++) {
      const dx = nodes[i].x - e.clientX, dy = nodes[i].y - e.clientY;
      const d = dx * dx + dy * dy;
      if (d < minDist) { minDist = d; nearest = i; }
    }
    if (nearest >= 0 && minDist < 200 * 200) {
      triggerCascade(nearest);
    }
  } else {
    // Single click — plant new growth point
    const idx = addNode(e.clientX, e.clientY, 0, -1);
    if (idx >= 0) {
      const branches = Math.floor(Math.random() * 3) + 3;
      for (let i = 0; i < branches; i++) {
        const angle = (i / branches) * Math.PI * 2 + (Math.random() - 0.5) * 0.5;
        growthQueue.push({ parentIndex: idx, angle, delay: Math.floor(Math.random() * 20 + 5) });
      }
    }
  }
});

// Touch support
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  const touch = e.changedTouches[0];
  const now = Date.now();
  const isDouble = (now - lastClickTime) < 350;
  lastClickTime = now;

  if (isDouble) {
    let nearest = -1, minDist = Infinity;
    for (let i = 0; i < nodes.length; i++) {
      const dx = nodes[i].x - touch.clientX, dy = nodes[i].y - touch.clientY;
      const d = dx * dx + dy * dy;
      if (d < minDist) { minDist = d; nearest = i; }
    }
    if (nearest >= 0 && minDist < 200 * 200) triggerCascade(nearest);
  } else {
    const idx = addNode(touch.clientX, touch.clientY, 0, -1);
    if (idx >= 0) {
      const branches = Math.floor(Math.random() * 3) + 3;
      for (let i = 0; i < branches; i++) {
        const angle = (i / branches) * Math.PI * 2 + (Math.random() - 0.5) * 0.5;
        growthQueue.push({ parentIndex: idx, angle, delay: Math.floor(Math.random() * 20 + 5) });
      }
    }
  }
}, { passive: false });

// --- Background ---
function drawBackground(time) {
  const bg = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.max(W, H) * 0.7);
  bg.addColorStop(0, '#0e1210');
  bg.addColorStop(0.5, '#0a0e0a');
  bg.addColorStop(1, '#060806');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Subtle organic vignette
  const vigAlpha = 0.03 + Math.sin(time * 0.0003) * 0.01;
  const vig = ctx.createRadialGradient(W / 2, H / 2, W * 0.2, W / 2, H / 2, W * 0.8);
  vig.addColorStop(0, 'rgba(20, 35, 20, 0)');
  vig.addColorStop(1, `rgba(5, 8, 5, ${vigAlpha})`);
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, W, H);
}

// --- Draw edges ---
function drawEdges(time) {
  for (const e of edges) {
    const from = nodes[e.from];
    const to = nodes[e.to];
    if (!from || !to) continue;

    const fadeIn = Math.min(1, to.age / to.maxAge);
    const basePulse = 0.5 + 0.25 * Math.sin(time * 0.002 + from.pulsePhase) +
                      0.25 * Math.sin(time * 0.002 + to.pulsePhase);
    const avgR = (from.color.r + to.color.r) / 2;
    const avgG = (from.color.g + to.color.g) / 2;
    const avgB = (from.color.b + to.color.b) / 2;
    const alpha = basePulse * 0.25 * fadeIn;

    // Check if edge has active signal for extra glow
    let signalGlow = 0;
    for (const s of signals) {
      if (s.edge === e) signalGlow = Math.max(signalGlow, s.life);
    }

    ctx.beginPath();
    ctx.moveTo(from.x, from.y);
    ctx.lineTo(to.x, to.y);

    if (signalGlow > 0) {
      const sc = synapticBlue();
      ctx.strokeStyle = `rgba(${sc.r}, ${sc.g}, ${sc.b}, ${(alpha + signalGlow * 0.6) * fadeIn})`;
      ctx.lineWidth = 1.2 + signalGlow * 1.5;
      ctx.shadowColor = `rgba(${sc.r}, ${sc.g}, ${sc.b}, ${signalGlow * 0.5})`;
      ctx.shadowBlur = 8 * signalGlow;
    } else {
      ctx.strokeStyle = `rgba(${avgR}, ${avgG}, ${avgB}, ${alpha})`;
      ctx.lineWidth = 0.6 + basePulse * 0.3;
      ctx.shadowColor = 'transparent';
      ctx.shadowBlur = 0;
    }
    ctx.stroke();
  }
  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;
}

// --- Draw nodes ---
function drawNodes(time) {
  for (const n of nodes) {
    n.age++;
    const fadeIn = Math.min(1, n.age / n.maxAge);
    const pulse = 0.5 + 0.5 * Math.sin(time * n.pulseSpeed + n.pulsePhase);
    const size = n.baseSize * (0.8 + pulse * 0.4) * fadeIn;

    // Signal brightness decay
    if (n.signalBrightness > 0) n.signalBrightness *= 0.96;

    let r = n.color.r, g = n.color.g, b = n.color.b;
    let glowAlpha = (0.3 + pulse * 0.3) * fadeIn;
    let coreAlpha = (0.5 + pulse * 0.4) * fadeIn;
    let glowSize = size * 4;

    // Synaptic flash
    if (n.signalBrightness > 0.05) {
      const sc = synapticBlue();
      const blend = n.signalBrightness;
      r = r * (1 - blend) + sc.r * blend;
      g = g * (1 - blend) + sc.g * blend;
      b = b * (1 - blend) + sc.b * blend;
      glowAlpha += blend * 0.5;
      coreAlpha += blend * 0.4;
      glowSize += blend * 15;
    }

    // Outer glow
    const grad = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, glowSize);
    grad.addColorStop(0, `rgba(${r|0}, ${g|0}, ${b|0}, ${glowAlpha * 0.4})`);
    grad.addColorStop(0.4, `rgba(${r|0}, ${g|0}, ${b|0}, ${glowAlpha * 0.1})`);
    grad.addColorStop(1, `rgba(${r|0}, ${g|0}, ${b|0}, 0)`);
    ctx.beginPath();
    ctx.arc(n.x, n.y, glowSize, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    // Core
    ctx.beginPath();
    ctx.arc(n.x, n.y, size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${Math.min(255, r + 60)|0}, ${Math.min(255, g + 60)|0}, ${Math.min(255, b + 40)|0}, ${coreAlpha})`;
    ctx.fill();
  }
}

// --- Draw traveling signals ---
function updateSignals() {
  for (let i = signals.length - 1; i >= 0; i--) {
    const s = signals[i];
    s.progress += s.speed;
    s.life *= 0.97;
    if (s.progress < 0 || s.progress > 1 || s.life < 0.02) {
      signals.splice(i, 1);
      continue;
    }
    const from = nodes[s.edge.from];
    const to = nodes[s.edge.to];
    if (!from || !to) { signals.splice(i, 1); continue; }

    const x = from.x + (to.x - from.x) * s.progress;
    const y = from.y + (to.y - from.y) * s.progress;

    const sc = synapticBlue();
    const grad = ctx.createRadialGradient(x, y, 0, x, y, 6 + s.life * 8);
    grad.addColorStop(0, `rgba(${sc.r}, ${sc.g}, ${sc.b}, ${s.life * 0.8})`);
    grad.addColorStop(0.5, `rgba(${sc.r}, ${sc.g}, ${sc.b}, ${s.life * 0.2})`);
    grad.addColorStop(1, `rgba(${sc.r}, ${sc.g}, ${sc.b}, 0)`);
    ctx.beginPath();
    ctx.arc(x, y, 6 + s.life * 8, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
  }
}

// --- Initialize ---
// Seed the garden from center
const seedIdx = addNode(W / 2, H / 2, 0, -1);
const initialBranches = 5 + Math.floor(Math.random() * 3);
for (let i = 0; i < initialBranches; i++) {
  const angle = (i / initialBranches) * Math.PI * 2 + (Math.random() - 0.5) * 0.3;
  growthQueue.push({ parentIndex: seedIdx, angle, delay: Math.floor(Math.random() * 30 + 5) });
}

// Spores
const sporeCount = Math.min(Math.max(Math.floor((W * H) / 6000), 60), 200);
for (let i = 0; i < sporeCount; i++) spores.push(new Spore());

// Periodic spontaneous growth from leaf nodes
let growthTimer = 0;

// --- Main loop ---
function animate(time) {
  drawBackground(time);

  // Spores
  for (const s of spores) { s.update(time); s.draw(time); }

  // Process queued growth
  processGrowthQueue();

  // Spontaneous growth from tips
  growthTimer++;
  if (growthTimer % 30 === 0 && nodes.length < maxNodes) {
    // Find leaf nodes (nodes with no children)
    const leaves = [];
    for (let i = 0; i < nodes.length; i++) {
      if (nodes[i].children.length === 0 && nodes[i].depth < 25) leaves.push(i);
    }
    if (leaves.length > 0) {
      const pick = leaves[Math.floor(Math.random() * leaves.length)];
      scheduleGrowth(pick);
    }
  }

  // Occasional random synaptic flash
  if (Math.random() < 0.003 && nodes.length > 10) {
    const randomNode = Math.floor(Math.random() * nodes.length);
    nodes[randomNode].signalBrightness = 0.6 + Math.random() * 0.4;
    // Small localized cascade (just immediate neighbors)
    for (const e of edges) {
      if (e.from === randomNode || e.to === randomNode) {
        signals.push({
          edge: e,
          progress: e.from === randomNode ? 0 : 1,
          speed: e.from === randomNode ? 0.04 : -0.04,
          life: 0.5,
        });
      }
    }
  }

  // Draw network
  drawEdges(time);
  updateSignals();
  drawNodes(time);

  requestAnimationFrame(animate);
}

requestAnimationFrame(animate);
</script>
</body>
</html>
