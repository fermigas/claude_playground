<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gravity Sandbox</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
  canvas { display: block; }
  #label {
    position: fixed; bottom: 16px; right: 20px;
    font-family: 'Courier New', monospace; font-size: 11px;
    color: rgba(140, 160, 200, 0.35); letter-spacing: 1.5px;
    pointer-events: none; user-select: none;
  }
  #hint {
    position: fixed; top: 16px; left: 20px;
    font-family: 'Courier New', monospace; font-size: 11px;
    color: rgba(140, 160, 200, 0.3); letter-spacing: 1px;
    pointer-events: none; user-select: none;
    transition: opacity 3s;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">click to place stars &middot; drag to launch with velocity &middot; scroll to change mass &middot; [c] clear &middot; [t] trails &middot; [g] grid</div>
<div id="label">claude_playground &mdash; celestial mechanics</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// Fade hint after 6 seconds
setTimeout(() => { document.getElementById('hint').style.opacity = '0'; }, 6000);

// --- State ---
const G = 0.4;
const bodies = [];
const maxTrail = 300;
let showTrails = true;
let showGrid = false;
let nextMass = 500;
let dragging = false;
let dragStart = null;
let dragCurrent = null;

// Star colors by mass
function starColor(mass) {
  if (mass < 200) return { r: 200, g: 220, b: 255, name: 'dwarf' };       // blue-white dwarf
  if (mass < 600) return { r: 255, g: 240, b: 200, name: 'sun' };         // yellow sun
  if (mass < 1500) return { r: 255, g: 180, b: 100, name: 'giant' };      // orange giant
  if (mass < 4000) return { r: 255, g: 120, b: 80, name: 'red giant' };   // red giant
  return { r: 180, g: 160, b: 255, name: 'massive' };                      // blue massive
}

function starRadius(mass) {
  return Math.max(2, Math.pow(mass, 0.38) * 0.6);
}

class Body {
  constructor(x, y, vx, vy, mass) {
    this.x = x; this.y = y;
    this.vx = vx; this.vy = vy;
    this.mass = mass;
    this.radius = starRadius(mass);
    this.color = starColor(mass);
    this.trail = [];
    this.alive = true;
    this.age = 0;
    this.pulsePhase = Math.random() * Math.PI * 2;
  }

  update(dt) {
    this.age++;
    this.trail.push({ x: this.x, y: this.y });
    if (this.trail.length > maxTrail) this.trail.shift();

    // Gravitational interaction with all other bodies
    for (const other of bodies) {
      if (other === this || !other.alive) continue;
      const dx = other.x - this.x;
      const dy = other.y - this.y;
      const distSq = dx * dx + dy * dy;
      const dist = Math.sqrt(distSq);

      // Collision
      if (dist < this.radius + other.radius) {
        // Merge: bigger absorbs smaller
        if (this.mass >= other.mass) {
          this.vx = (this.vx * this.mass + other.vx * other.mass) / (this.mass + other.mass);
          this.vy = (this.vy * this.mass + other.vy * other.mass) / (this.mass + other.mass);
          this.mass += other.mass;
          this.radius = starRadius(this.mass);
          this.color = starColor(this.mass);
          other.alive = false;
          // Spawn debris
          for (let i = 0; i < 8; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = Math.random() * 2 + 1;
            debris.push({
              x: other.x, y: other.y,
              vx: Math.cos(angle) * speed + this.vx * 0.5,
              vy: Math.sin(angle) * speed + this.vy * 0.5,
              life: 40 + Math.random() * 40,
              maxLife: 80,
              r: other.color.r, g: other.color.g, b: other.color.b,
            });
          }
        }
        continue;
      }

      const force = G * this.mass * other.mass / (distSq + 100);
      const ax = force * dx / dist / this.mass;
      const ay = force * dy / dist / this.mass;
      this.vx += ax * dt;
      this.vy += ay * dt;
    }

    this.x += this.vx * dt;
    this.y += this.vy * dt;
  }

  draw(time) {
    const { r, g, b } = this.color;
    const pulse = 0.7 + 0.3 * Math.sin(time * 0.004 + this.pulsePhase);

    // Trail
    if (showTrails && this.trail.length > 1) {
      ctx.beginPath();
      ctx.moveTo(this.trail[0].x, this.trail[0].y);
      for (let i = 1; i < this.trail.length; i++) {
        ctx.lineTo(this.trail[i].x, this.trail[i].y);
      }
      ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, 0.12)`;
      ctx.lineWidth = 0.8;
      ctx.stroke();
    }

    // Outer glow
    const glowR = this.radius * (4 + pulse);
    const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, glowR);
    grad.addColorStop(0, `rgba(${r}, ${g}, ${b}, ${0.4 * pulse})`);
    grad.addColorStop(0.3, `rgba(${r}, ${g}, ${b}, ${0.15 * pulse})`);
    grad.addColorStop(1, `rgba(${r}, ${g}, ${b}, 0)`);
    ctx.beginPath();
    ctx.arc(this.x, this.y, glowR, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    // Core
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    const coreGrad = ctx.createRadialGradient(
      this.x - this.radius * 0.3, this.y - this.radius * 0.3, 0,
      this.x, this.y, this.radius
    );
    coreGrad.addColorStop(0, `rgba(${Math.min(255, r + 80)}, ${Math.min(255, g + 80)}, ${Math.min(255, b + 80)}, 1)`);
    coreGrad.addColorStop(1, `rgba(${r}, ${g}, ${b}, 0.9)`);
    ctx.fillStyle = coreGrad;
    ctx.fill();
  }
}

// --- Debris particles ---
const debris = [];

function updateDebris() {
  for (let i = debris.length - 1; i >= 0; i--) {
    const d = debris[i];
    d.x += d.vx;
    d.y += d.vy;
    d.vx *= 0.98;
    d.vy *= 0.98;
    d.life--;
    if (d.life <= 0) { debris.splice(i, 1); continue; }
    const alpha = d.life / d.maxLife;
    ctx.beginPath();
    ctx.arc(d.x, d.y, 1.5 * alpha, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${d.r}, ${d.g}, ${d.b}, ${alpha * 0.8})`;
    ctx.fill();
  }
}

// --- Background stars ---
const bgStars = [];
for (let i = 0; i < 200; i++) {
  bgStars.push({
    x: Math.random() * 3000,
    y: Math.random() * 2000,
    size: Math.random() * 1.2 + 0.2,
    alpha: Math.random() * 0.5 + 0.1,
    twinkle: Math.random() * 0.01 + 0.003,
    phase: Math.random() * Math.PI * 2,
  });
}

function drawBackground(time) {
  ctx.fillStyle = '#020208';
  ctx.fillRect(0, 0, W, H);

  // Grid
  if (showGrid) {
    ctx.strokeStyle = 'rgba(40, 50, 80, 0.15)';
    ctx.lineWidth = 0.5;
    const spacing = 50;
    for (let x = 0; x < W; x += spacing) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
    for (let y = 0; y < H; y += spacing) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }
  }

  // Stars
  for (const s of bgStars) {
    const twinkle = 0.5 + 0.5 * Math.sin(time * s.twinkle + s.phase);
    ctx.beginPath();
    ctx.arc(s.x % W, s.y % H, s.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200, 210, 240, ${s.alpha * twinkle})`;
    ctx.fill();
  }
}

// --- Gravity field visualization on drag ---
function drawGravField() {
  if (!dragging || !dragStart) return;

  // Launch vector
  const dx = dragStart.x - dragCurrent.x;
  const dy = dragStart.y - dragCurrent.y;
  ctx.beginPath();
  ctx.moveTo(dragStart.x, dragStart.y);
  ctx.lineTo(dragStart.x + dx, dragStart.y + dy);
  ctx.strokeStyle = 'rgba(100, 200, 255, 0.4)';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([5, 5]);
  ctx.stroke();
  ctx.setLineDash([]);

  // Arrow head
  const angle = Math.atan2(dy, dx);
  const headLen = 10;
  ctx.beginPath();
  ctx.moveTo(dragStart.x + dx, dragStart.y + dy);
  ctx.lineTo(dragStart.x + dx - Math.cos(angle - 0.4) * headLen, dragStart.y + dy - Math.sin(angle - 0.4) * headLen);
  ctx.moveTo(dragStart.x + dx, dragStart.y + dy);
  ctx.lineTo(dragStart.x + dx - Math.cos(angle + 0.4) * headLen, dragStart.y + dy - Math.sin(angle + 0.4) * headLen);
  ctx.strokeStyle = 'rgba(100, 200, 255, 0.4)';
  ctx.stroke();

  // Preview body
  const previewR = starRadius(nextMass);
  const previewColor = starColor(nextMass);
  ctx.beginPath();
  ctx.arc(dragStart.x, dragStart.y, previewR, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(${previewColor.r}, ${previewColor.g}, ${previewColor.b}, 0.5)`;
  ctx.fill();

  // Mass label
  ctx.fillStyle = 'rgba(150, 180, 220, 0.5)';
  ctx.font = '10px Courier New';
  ctx.fillText(`mass: ${nextMass}`, dragStart.x + previewR + 8, dragStart.y + 4);
}

// --- HUD ---
function drawHUD() {
  ctx.fillStyle = 'rgba(120, 150, 200, 0.25)';
  ctx.font = '11px Courier New';
  const count = bodies.filter(b => b.alive).length;
  ctx.fillText(`bodies: ${count}  |  mass: ${nextMass}  |  trails: ${showTrails ? 'on' : 'off'}  |  grid: ${showGrid ? 'on' : 'off'}`, 20, H - 16);
}

// --- Input ---
canvas.addEventListener('mousedown', e => {
  dragging = true;
  dragStart = { x: e.clientX, y: e.clientY };
  dragCurrent = { x: e.clientX, y: e.clientY };
});

canvas.addEventListener('mousemove', e => {
  if (dragging) dragCurrent = { x: e.clientX, y: e.clientY };
});

canvas.addEventListener('mouseup', e => {
  if (dragging && dragStart) {
    const dx = (dragStart.x - e.clientX) * 0.02;
    const dy = (dragStart.y - e.clientY) * 0.02;
    bodies.push(new Body(dragStart.x, dragStart.y, dx, dy, nextMass));
  }
  dragging = false;
  dragStart = null;
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  if (e.deltaY < 0) nextMass = Math.min(10000, nextMass * 1.2);
  else nextMass = Math.max(20, nextMass / 1.2);
  nextMass = Math.round(nextMass);
}, { passive: false });

// Touch
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  dragging = true;
  dragStart = { x: t.clientX, y: t.clientY };
  dragCurrent = { x: t.clientX, y: t.clientY };
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (dragging) { const t = e.touches[0]; dragCurrent = { x: t.clientX, y: t.clientY }; }
}, { passive: false });
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (dragging && dragStart) {
    const t = e.changedTouches[0];
    const dx = (dragStart.x - t.clientX) * 0.02;
    const dy = (dragStart.y - t.clientY) * 0.02;
    bodies.push(new Body(dragStart.x, dragStart.y, dx, dy, nextMass));
  }
  dragging = false; dragStart = null;
}, { passive: false });

document.addEventListener('keydown', e => {
  if (e.key === 'c') { bodies.length = 0; debris.length = 0; }
  if (e.key === 't') showTrails = !showTrails;
  if (e.key === 'g') showGrid = !showGrid;
});

// --- Seed with a simple solar system ---
bodies.push(new Body(W / 2, H / 2, 0, 0, 3000)); // central star
// Orbiting bodies
for (let i = 0; i < 4; i++) {
  const dist = 100 + i * 80;
  const angle = Math.random() * Math.PI * 2;
  const orbitalV = Math.sqrt(G * 3000 / dist) * 0.85;
  const x = W / 2 + Math.cos(angle) * dist;
  const y = H / 2 + Math.sin(angle) * dist;
  const vx = -Math.sin(angle) * orbitalV;
  const vy = Math.cos(angle) * orbitalV;
  bodies.push(new Body(x, y, vx, vy, 30 + Math.random() * 80));
}

// --- Main loop ---
function animate(time) {
  drawBackground(time);

  // Physics substeps for stability
  const substeps = 3;
  for (let s = 0; s < substeps; s++) {
    for (const b of bodies) { if (b.alive) b.update(1 / substeps); }
  }

  // Remove dead
  for (let i = bodies.length - 1; i >= 0; i--) {
    if (!bodies[i].alive) bodies.splice(i, 1);
  }

  // Draw
  for (const b of bodies) b.draw(time);
  updateDebris();
  drawGravField();
  drawHUD();

  requestAnimationFrame(animate);
}

requestAnimationFrame(animate);
</script>
</body>
</html>
